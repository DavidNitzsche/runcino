<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faff · Session card (blueprint)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#14110d;color:#efe9df;padding:34px 48px 70px;}
  .mono{font-family:'Oswald',sans-serif;}
  .pagehead h1{font-size:21px;font-weight:800;letter-spacing:-.3px;}
  .pagehead p{font-size:13.5px;color:#8d867a;margin-top:6px;max-width:820px;line-height:1.55;}
  .stack{display:flex;flex-direction:column;gap:24px;margin-top:26px;max-width:760px;}

  .card{position:relative;border-radius:24px;overflow:hidden;padding:22px 24px 22px;min-height:466px;
    box-shadow:0 24px 50px -20px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.14);}
  .card>div{display:flex;flex-direction:column;height:100%;min-height:inherit;}
  .card.long{background:linear-gradient(150deg,#e0922f 0%,#c96e2a 60%,#9c5520 100%);}
  .card.intervals{background:linear-gradient(150deg,#ef6d63 0%,#cf4250 58%,#9c2740 100%);}
  .card.easy{background:linear-gradient(150deg,#2bbf9a 0%,#1f8f86 58%,#136a6a 100%);}
  .card::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(120% 80% at 80% 0%,rgba(255,255,255,.12),transparent 60%);}
  .card>*{position:relative;z-index:1;}

  /* clean stats — no box, no dividers, no dots */
  .ch{flex:0 0 auto;margin-bottom:10px;}

  /* A · clean: big numbers, label beneath, separated by air only */
  .hA{display:flex;align-items:flex-start;gap:38px;}
  .hA .m .n{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;letter-spacing:-.6px;line-height:.92;}
  .hA .m .n small{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;opacity:.82;margin-left:3px;}
  .hA .m .k{font-size:9px;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.82);margin-top:8px;}

  /* B · hero: distance dominant, the rest a quiet supporting line */
  .hB .big{font-family:'Oswald',sans-serif;font-size:46px;font-weight:700;letter-spacing:-1.5px;line-height:.85;}
  .hB .big small{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;opacity:.6;margin-left:5px;letter-spacing:0;}
  .hB .sub{margin-top:9px;font-size:13px;font-weight:700;letter-spacing:.2px;color:rgba(255,255,255,.78);}
  .hB .sub b{font-family:'Oswald',sans-serif;font-weight:700;color:#fff;}

  .chartwrap{flex:1 1 auto;display:flex;align-items:center;min-height:0;margin:6px 0;}
  .chart{width:100%;display:block;}

  .cue{margin-top:auto;flex:0 0 auto;display:flex;align-items:center;gap:11px;
    font-size:14.5px;font-weight:600;color:rgba(255,255,255,.94);line-height:1.45;
    padding:14px 17px;border-radius:14px;background:rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.14);}
  .cue .cdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.7);flex:0 0 auto;}
</style>
</head>
<body>
  <div class="pagehead">
    <h1>SESSION card · blueprint</h1>
    <p>Clean stat header (no box, no dividers, no dots) — big numbers with brighter labels beneath. Shown on Long, Intervals, and Easy.</p>
  </div>

  <div class="stack">
    <div class="card long"><div data-type="long" data-hdr="A"></div></div>
    <div class="card intervals"><div data-type="intervals" data-hdr="A"></div></div>
    <div class="card easy"><div data-type="easy" data-hdr="A"></div></div>
  </div>

<script>
  var ZC = ['#48B3B5','#3EBD41','#F3AD38','#FF8847','#FC4D64'];
  var SESS = {
    long: { name:'Long Run', dist:'18.0', est:'~2:18', zone:'Z2→MP', cue:'Easy first 10, then squeeze the last 4 to marathon pace.',
      segs:[ {from:0,to:14,zone:2,color:'#F3AD38',label:'Steady',pace:'7:40',zn:'Z2'},
             {from:14,to:18,zone:3,color:'#FF8847',label:'MP finish',pace:'6:50',zn:'Z3'} ],
      fuel:[5,10,15] },
    intervals: { name:'Track Intervals', dist:'9.0', est:'~48<small>min</small>', zone:'Z5', cue:'Full float between reps. Hit goal pace, not faster, on rep 1.',
      segs:[ {from:0,to:1.5,zone:2,color:'#48B3B5',label:'Warm-up',pace:'9:00',zn:'Z2'},
             {from:1.5,to:7.5,zone:5,color:'#FC4D64',label:'6 × 800 m',pace:'2:55',zn:'Z5',reps:6,sub:'400 m float'},
             {from:7.5,to:9,zone:2,color:'#48B3B5',label:'Cool-down',pace:'9:00',zn:'Z2'} ],
      fuel:[] },
    easy: { name:'Easy Aerobic', dist:'6.0', est:'~52<small>min</small>', zone:'Z2', cue:'Keep it truly easy. Nose-breathing pace the whole way.',
      segs:[ {from:0,to:6,zone:2,color:'#3EBD41',label:'Easy aerobic',pace:'8:45',zn:'Z2'} ],
      fuel:[] }
  };

  function FUELICON(x,y){ return '<path d="M'+x+' '+(y-8)+' C'+(x+5)+' '+(y-2)+' '+(x+4.5)+' '+(y+4)+' '+x+' '+(y+4)+' C'+(x-4.5)+' '+(y+4)+' '+(x-5)+' '+(y-2)+' '+x+' '+(y-8)+' Z" fill="rgba(255,255,255,.92)"/>'; }

  function buildB(s){
    var total = s.segs[s.segs.length-1].to;
    var hasReps = s.segs.some(function(x){return x.reps;});
    var W=712, H=288, padL=30, padR=16, padT=(hasReps?56:30), padB=30;
    var x0=padL, x1=W-padR, y0=H-padB, y1=padT;
    var X=function(mi){ return x0+(mi/total)*(x1-x0); };
    var laneH=(y0-y1)/5;
    var lanes='';
    for(var zz=1; zz<=5; zz++){
      var ly=y0-(zz-1)*laneH, lt=ly-laneH;
      if(zz%2===0) lanes+='<rect x="'+x0+'" y="'+lt+'" width="'+(x1-x0)+'" height="'+laneH+'" fill="rgba(255,255,255,.05)"/>';
      lanes+='<line x1="'+x0+'" y1="'+ly+'" x2="'+x1+'" y2="'+ly+'" stroke="rgba(255,255,255,.12)" stroke-width="1"/>';
      lanes+='<text x="'+(x0-8)+'" y="'+(ly-laneH/2+3)+'" text-anchor="end" font-family="Oswald" font-size="9" fill="rgba(255,255,255,.5)">Z'+zz+'</text>';
    }
    var blocks='';
    s.segs.forEach(function(seg){
      var bx=X(seg.from), bw=X(seg.to)-X(seg.from);
      var bh=seg.zone*laneH, by=y0-bh;
      if(seg.reps){
        var n=seg.reps, units=n*2+(n-1), uW=bw/units, fcol='#48B3B5';
        var repBh=5*laneH, repBy=y0-repBh, floBh=1.3*laneH, floBy=y0-floBh, cxp=bx;
        for(var r=0;r<n;r++){
          var rw=2*uW;
          blocks+='<rect x="'+(cxp+1)+'" y="'+repBy+'" width="'+(rw-2)+'" height="'+repBh+'" rx="4" fill="'+seg.color+'" opacity=".96"/>'
            + '<rect x="'+(cxp+1)+'" y="'+repBy+'" width="'+(rw-2)+'" height="'+repBh+'" rx="4" fill="url(#sh'+s._id+')"/>';
          cxp+=rw;
          if(r<n-1){
            blocks+='<rect x="'+cxp+'" y="'+floBy+'" width="'+uW+'" height="'+floBh+'" rx="3" fill="'+fcol+'" opacity=".85"/>'
              + '<rect x="'+cxp+'" y="'+floBy+'" width="'+uW+'" height="'+floBh+'" rx="3" fill="url(#sh'+s._id+')"/>';
            cxp+=uW;
          }
        }
        var bxs=bx+1, bxe=bx+bw-1, byr=repBy-9, gcx=bx+bw/2;
        blocks+='<path d="M'+bxs+' '+(byr+5)+' L'+bxs+' '+byr+' L'+bxe+' '+byr+' L'+bxe+' '+(byr+5)+'" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.3"/>'
          + '<text x="'+gcx+'" y="'+(byr-6)+'" text-anchor="middle" font-family="Inter" font-size="11.5" font-weight="800" letter-spacing=".3" fill="#fff">'+seg.label+' <tspan font-family="Oswald" font-weight="700" fill="rgba(255,255,255,.82)">@ '+seg.pace+' /800m</tspan></text>';
        return;
      }
      blocks+='<rect x="'+(bx+2)+'" y="'+by+'" width="'+(bw-4)+'" height="'+bh+'" rx="8" fill="'+seg.color+'" opacity=".96"/>'
        + '<rect x="'+(bx+2)+'" y="'+by+'" width="'+(bw-4)+'" height="'+bh+'" rx="8" fill="url(#sh'+s._id+')"/>';
      var tx=bx+14;
      blocks+='<text x="'+tx+'" y="'+(by+19)+'" font-family="Inter" font-size="9.5" font-weight="800" letter-spacing="1" fill="rgba(255,255,255,.82)">'+seg.label.toUpperCase()+'</text>'
        + '<text x="'+tx+'" y="'+(by+41)+'" font-family="Oswald" font-size="20" font-weight="700" fill="#fff">'+seg.pace+'<tspan font-size="11" fill="rgba(255,255,255,.72)"> /mi</tspan></text>';
      if(bh>62) blocks+='<text x="'+tx+'" y="'+(by+bh-11)+'" font-family="Oswald" font-size="11" font-weight="600" fill="rgba(255,255,255,.7)">'+(seg.to-seg.from)+' mi · '+seg.zn+'</text>';
    });
    var ruler='<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y0+'" stroke="rgba(255,255,255,.35)" stroke-width="1.4"/>';
    var stepMi=(total>10?2:1);
    for(var t=0;t<=total+0.001;t+=stepMi){ var rx2=X(t); ruler+='<line x1="'+rx2+'" y1="'+y0+'" x2="'+rx2+'" y2="'+(y0+4)+'" stroke="rgba(255,255,255,.45)" stroke-width="1.2"/>'
      + '<text x="'+rx2+'" y="'+(y0+16)+'" text-anchor="middle" font-family="Oswald" font-size="9.5" fill="rgba(255,255,255,.55)">'+t+'</text>'; }
    ruler+='<text x="'+x1+'" y="'+(y0+16)+'" text-anchor="end" font-family="Oswald" font-size="9.5" fill="rgba(255,255,255,.5)">MI</text>';
    var fuel='';
    s.fuel.forEach(function(f){ var fx=X(f); fuel+='<line x1="'+fx+'" y1="'+(y1+28)+'" x2="'+fx+'" y2="'+y0+'" stroke="rgba(255,255,255,.4)" stroke-width="1" stroke-dasharray="2 3"/>'+FUELICON(fx,y1+5)
      + '<text x="'+fx+'" y="'+(y1+22)+'" text-anchor="middle" font-family="Oswald" font-size="8" font-weight="700" fill="rgba(255,255,255,.78)">GEL</text>'; });
    return '<svg class="chart" viewBox="0 0 '+W+' '+H+'"><defs><linearGradient id="sh'+s._id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".26"/><stop offset="42%" stop-color="#fff" stop-opacity="0"/></linearGradient></defs>'+lanes+blocks+ruler+fuel+'</svg>';
  }

  function headerHTML(s, hdr){
    if(hdr==='B'){
      return '<div class="ch hB">'
        + '<div class="big">'+s.dist+'<small>mi</small></div>'
        + '<div class="sub"><b>'+s.est+'</b> est · effort <b>'+s.zone+'</b></div>'
        + '</div>';
    }
    return '<div class="ch hA">'
      + '<div class="m"><div class="n">'+s.dist+'<small>mi</small></div><div class="k">DISTANCE</div></div>'
      + '<div class="m"><div class="n">'+s.est+'</div><div class="k">EST TIME</div></div>'
      + '<div class="m"><div class="n">'+s.zone+'</div><div class="k">EFFORT</div></div>'
      + '</div>';
  }

  document.querySelectorAll('[data-type]').forEach(function(el){
    var s=SESS[el.dataset.type]; s._id=el.dataset.type+(el.dataset.hdr||'');
    el.innerHTML =
      headerHTML(s, el.dataset.hdr)
      + '<div class="chartwrap">'+buildB(s)+'</div>'
      + '<div class="cue"><span class="cdot"></span><span class="tx">'+s.cue+'</span></div>';
  });
</script>
</body>
</html>
