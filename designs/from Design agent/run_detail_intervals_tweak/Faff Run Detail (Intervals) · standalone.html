document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

border:1px solid var(--glass-line);border-radius:16px;padding:25px 25px 22px;display:flex;flex-direction:column;min-height:0;}\n  .vhead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}\n  .vhead .ok{color:#8af0a6;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:2px;white-space:nowrap;margin-top:7px;flex:0 0 auto;}\n  .vhead .ok svg{width:13px;height:13px;}\n\n  .verdict{font-family:var(--font-display);font-size:30px;font-weight:600;line-height:1;white-space:nowrap;}\n  .recap{font-size:13.5px;font-weight:500;line-height:1.55;color:rgba(255,255,255,.88);margin-top:11px;}\n\n  .divider{height:1px;background:rgba(255,255,255,.12);margin:20px 0 0;}\n\n  /* reps section */\n  .repshead{display:flex;justify-content:space-between;align-items:baseline;margin:18px 0 4px;}\n  .repshead .rt{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:.5px;white-space:nowrap;}\n  .repshead .rg{font-size:10px;font-weight:700;letter-spacing:.6px;color:rgba(255,255,255,.6);white-space:nowrap;}\n  .repshead .rg b{font-family:var(--font-display);font-size:13px;color:#fff;font-weight:600;letter-spacing:.3px;}\n\n  .rail{margin-top:8px;flex:1;min-height:0;max-height:300px;overflow-y:auto;overflow-x:hidden;padding-right:4px;}\n  .rail.scrollable{-webkit-mask-image:linear-gradient(to bottom,#000 calc(100% - 16px),transparent);\n    mask-image:linear-gradient(to bottom,#000 calc(100% - 16px),transparent);}\n  .rail::-webkit-scrollbar{width:5px;}\n  .rail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px;}\n  .rail::-webkit-scrollbar-track{background:transparent;}\n  /* compact mode kicks in for high rep counts: single-line rows */\n  .rail.compact .phase{padding:4px 0;}\n  .rail.compact .rep{padding:4px 0;}\n  .rail.compact .rep .rl .rn{font-size:13px;}\n  .rail.compact .rep .rl .rsub{display:none;}\n  .rail.compact .rep .rr{display:flex;align-items:baseline;justify-content:flex-end;gap:5px;}\n  .rail.compact .rep .rr .rp{font-size:14px;}\n  .rail.compact .rep .rr .rd{font-size:10px;margin-top:0;}\n  .rail.compact .rtrk{height:9px;}\n\n  /* easy phase rows (warm-up / cool-down) */\n  .phase{display:flex;align-items:center;gap:11px;padding:8px 0;}\n  .phase .pdot{width:8px;height:8px;border-radius:50%;background:var(--z1a);flex:0 0 auto;}\n  .phase .pn{font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.72);}\n  .phase .pd{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);margin-left:2px;}\n  .phase .pp{margin-left:auto;font-family:var(--font-display);font-size:14px;font-weight:500;color:rgba(255,255,255,.8);}\n  .phase .pp small{font-family:var(--font-body);font-size:9.5px;font-weight:500;opacity:.6;}\n\n  /* a single work rep */\n  .rep{display:grid;grid-template-columns:46px 1fr 70px;align-items:center;gap:13px;padding:9px 0;}\n  .rep .rl{display:flex;flex-direction:column;gap:2px;}\n  .rep .rl .rn{font-family:var(--font-display);font-size:16px;font-weight:600;line-height:1;}\n  .rep .rl .rsub{font-size:8.5px;font-weight:700;letter-spacing:.6px;opacity:.5;}\n  .rtrk{position:relative;height:11px;border-radius:6px;background:rgba(255,255,255,.1);}\n  .rfill{position:absolute;top:1px;bottom:1px;border-radius:3px;}\n  .rfill.good{background:var(--good);}\n  .rfill.warn{background:var(--warn);}\n  .raxis{position:absolute;left:50%;top:-2px;bottom:-2px;width:2px;margin-left:-1px;background:rgba(255,255,255,.92);border-radius:1px;z-index:3;box-shadow:0 0 0 1px rgba(0,0,0,.2);}\n  .rep .rr{text-align:right;}\n  /* diverging-bar axis legend (aligned to the track column) */\n  .axislegend{display:grid;grid-template-columns:46px 1fr 70px;gap:13px;margin-top:12px;margin-bottom:2px;}\n  .axll{grid-column:2;display:flex;align-items:center;justify-content:space-between;position:relative;font-size:8px;font-weight:700;letter-spacing:1.2px;}\n  .axll .s{color:var(--warn);opacity:.85;}\n  .axll .f{color:var(--good);opacity:.9;}\n  .axll .t{position:absolute;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.45);}\n  .rep .rr .rp{font-family:var(--font-display);font-size:16px;font-weight:600;line-height:1;}\n  .rep .rr .rd{font-size:10px;font-weight:700;line-height:1;margin-top:3px;}\n  .rep .rr .rd.good{color:var(--good);}\n  .rep .rr .rd.warn{color:var(--warn);}\n\n  /* recovery connector */\n  .rec{display:flex;align-items:center;gap:9px;padding:2px 0 2px 8px;margin-left:14px;border-left:1.5px dashed rgba(255,255,255,.18);}\n  .rec .rcl{font-size:9.5px;font-weight:600;letter-spacing:.4px;color:rgba(255,255,255,.42);}\n\n  .repsum{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);}\n  .repsum .sl{font-size:10px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.55);}\n  .repsum .sv{font-family:var(--font-display);font-size:17px;font-weight:600;}\n  .repsum .sv small{font-family:var(--font-body);font-size:10px;font-weight:500;opacity:.6;}\n  .repsum .sv .delta{color:var(--good);font-size:12px;margin-left:5px;}\n  .vhead,.verdict,.recap,.divider,.repshead,.axislegend,.repsum{flex:0 0 auto;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"pr\" data-screen-label=\"Run Detail · Intervals\">\n    <div class=\"mesh\"><div class=\"blobs\">\n      <div class=\"blob b1\"><\u002Fdiv><div class=\"blob b2\"><\u002Fdiv><div class=\"blob b3\"><\u002Fdiv><div class=\"blob b4\"><\u002Fdiv><div class=\"blob b5\"><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n    <div class=\"fade\"><\u002Fdiv>\n\n    <div class=\"stage\">\n      <!-- top row: quality counter -->\n      <div class=\"toprow\">\n        <div class=\"weekcount\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12h4l3 8 4-16 3 8h4\"><\u002Fpath><\u002Fsvg>\n          1/1 QUALITY THIS WEE +'<\u002Fspan><\u002Fdiv>'\n      + '<div class=\"dmeta\"><span class=\"ddot\" style=\"background:'+d.dot+'\"><\u002Fspan><span class=\"ddist\">'+d.meta+'<\u002Fspan><\u002Fdiv><\u002Fdiv>';\n  }).join('');\n\n  /* ---------- time in zones ---------- */\n  var ZONES = [ ['Z1',14,'var(--z1a)'], ['Z2',0,'var(--z2a)'], ['Z3',29,'var(--z3a)'], ['Z4',43,'var(--z4a)'], ['Z5',14,'var(--z5a)'] ];\n  document.getElementById('zbar').innerHTML = ZONES.map(function(z){ return z[1]>0 ? '<i style=\"width:'+z[1]+'%;background:'+z[2]+'\"><\u002Fi>' : ''; }).join('');\n  document.getElementById('zleg').innerHTML = ZONES.map(function(z){\n    return '<div style=\"opacity:'+(z[1]===0?0.4:1)+'\"><span class=\"zs\" style=\"background:'+z[2]+'\"><\u002Fspan>'+z[0]+' <b>'+z[1]+'%<\u002Fb><\u002Fdiv>';\n  }).join('');\n\n  /* ---------- THE REPS · plan vs result (session-driven) ----------\n     Each work rep's bar maps actual pace onto a fixed window around the\n     target (longer fill = faster). The white tick marks target pace; a\n     fill past the tick = beat goal.\n\n     SCALING: the card height is bounded to the hero, and the rail is the\n     only scroll region inside it — so no matter how many reps, the page\n     never grows. Above ~6 reps the rail also auto-COMPACTS: per-recovery\n     rows collapse and rows tighten, so a 10-rep session still reads at a\n     glance without scrolling on a normal screen. */\n\n  function mmss(s){ var m=Math.floor(s/60), r=s%60; return m+':'+(r<10?'0':'')+r; }\n  function sgn(d){ return (d>0?'+':(d<0?'−':'±'))+Math.abs(d); }\n\n  // warm-up → reps (+recoveries) → cool-down, built from an array of rep seconds\n  function buildRail(o){\n    var rail=[ {type:'phase',name:'WARM-UP',dist:o.wu,pace:o.wuPace} ];\n    o.secs.forEach(function(sec,i){\n      rail.push({type:'rep',n:i+1,sec:sec,pace:mmss(sec),delta:sgn(sec-o.goal)});\n      if(i<o.secs.length-1) rail.push({type:'rec',t:o.rec+' jog · recovery'});\n    });\n    rail.push({type:'phase',name:'COOL-DOWN',dist:o.cd,pace:o.cdPace});\n    return rail;\n  }\n\n  var SESSIONS = {\n    four: {\n      dist:'7.5', time:'60:25', pace:'8:09',\n      goal:390, lo:360, hi:410, maxdev:14, target:'TARGET <b>6:30<\u002Fb>/mi',\n      verdict:'Reps done.',\n      recap:'Four 1-mile reps at 6:30 goal. Pushed every work bout to target or quicker, jogged the recoveries honest.',\n      sumlbl:'AVG WORK PACE', avg:'6:26<small>/mi<\u002Fsmall><span class=\"delta\">−4 vs goal<\u002Fspan>',\n      rail: buildRail({ goal:390, wu:'1.5 mi', wuPace:'9:48', cd:'1.0 mi', cdPace:'9:40', rec:'3:00',\n        secs:[388,382,395,378] })\n    },\n    ten: {\n      dist:'9.2', time:'1:14:30', pace:'8:05',\n      goal:175, lo:165, hi:188, maxdev:6, target:'TARGET <b>2:55<\u002Fb>/800m',\n      verdict:'Ten down.',\n      recap:'Ten 800s at 2:55 goal. Smooth and even through eight, leaked a couple seconds on the last two but held the session together.',\n      sumlbl:'AVG WORK', avg:'2:54<small>/800m<\u002Fsmall><span class=\"delta\">−1 vs goal<\u002Fspan>',\n      rail: buildRail({ goal:175, wu:'1.0 mi', wuPace:'9:30', cd:'1.0 mi', cdPace:'9:38', rec:'1:30',\n        secs:[172,171,173,172,174,173,175,176,179,177] })\n    }\n  };\n\n  function renderSession(key){\n    var s = SESSIONS[key], goal=s.goal, maxdev=s.maxdev||8;\n\n    document.getElementById('stats').innerHTML =\n        '<div class=\"stat\"><div class=\"v\">'+s.dist+'<small> mi<\u002Fsmall><\u002Fdiv><div class=\"k\">DISTANCE<\u002Fdiv><\u002Fdiv>'\n      + '<div class=\"stat\"><div class=\"v\">'+s.time+'<\u002Fdiv><div class=\"k\">TIME<\u002Fdiv><\u002Fdiv>'\n      + '<div class=\"stat\"><div class=\"v\">'+s.pace+'<small>/mi<\u002Fsmall><\u002Fdiv><div class=\"k\">AVG PACE<\u002Fdiv><\u002Fdiv>';\n\n    document.getElementById('verdict').textContent = s.verdict;\n    document.getElementById('recap').textContent = s.recap;\n    document.getElementById('target').innerHTML = s.target;\n    document.getElementById('sumlbl').textContent = s.sumlbl;\n    document.getElementById('avgwork').innerHTML = s.avg;\n\n    var reps = s.rail;\n    var workCount = reps.filter(function(r){return r.type==='rep';}).length;\n    var compact = workCount > 6;\n    var rail = document.getElementById('rail');\n    rail.className = 'rail' + (compact ? ' compact' : '');\n    rail.innerHTML = reps.map(function(r){\n      if(r.type==='phase'){\n        return '<div class=\"phase\"><span class=\"pdot\"><\u002Fspan><span class=\"pn\">'+r.name+'<\u002Fspan><span class=\"pd\">· '+r.dist+'<\u002Fspan>'\n          + '<span class=\"pp\">'+r.pace+'<small>/mi<\u002Fsmall><\u002Fspan><\u002Fdiv>';\n      }\n      if(r.type==='rec'){\n        return compact ? '' : '<div class=\"rec\"><span class=\"rcl\">'+r.t+'<\u002Fspan><\u002Fdiv>';\n      }\n      // diverging bar: target = centre, faster extends right, slower extends left\n      var d = r.sec - goal;                       // + slower · − faster\n      var cls = d > 0 ? 'warn' : 'good';\n      var mag = Math.max(Math.min(Math.abs(d)/maxdev, 1) * 50, 4);\n      var bs = d > 0 ? ('left:'+(50-mag)+'%;width:'+mag+'%')   // slower → left\n                     : ('left:50%;width:'+mag+'%');            // faster → right\n      if(d === 0) bs = 'left:47%;width:6%';                     // on target → centred nub\n      return '<div class=\"rep\">'\n        + '<div class=\"rl\"><span class=\"rn\">'+r.n+'<\u002Fspan><span class=\"rsub\">REP<\u002Fspan><\u002Fdiv>'\n        + '<div class=\"rtrk\"><div class=\"rfill '+cls+'\" style=\"'+bs+'\"><\u002Fdiv><div class=\"raxis\"><\u002Fdiv><\u002Fdiv>'\n        + '<div class=\"rr\"><div class=\"rp\">'+r.pace+'<\u002Fdiv><div class=\"rd '+cls+'\">'+r.delta+'<\u002Fdiv><\u002Fdiv>'\n        + '<\u002Fdiv>';\n    }).join('');\n    requestAnimationFrame(function(){ rail.classList.toggle('scrollable', rail.scrollHeight > rail.clientHeight + 2); });\n  }\n\n  renderSession('ten');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
