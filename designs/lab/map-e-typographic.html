<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Map E · Typographic hero</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#07090e; border:1px solid rgba(255,255,255,.08); border-radius:16px; overflow:hidden; position:relative; padding:36px 44px; }
svg{ display:block; width:100%; height:480px; }
.sub{ position:absolute; bottom:32px; left:44px; font-family:var(--f-data); font-size:10.5px; letter-spacing:2px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
.sub2{ position:absolute; bottom:32px; right:44px; font-family:var(--f-data); font-size:10.5px; letter-spacing:2px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <svg viewBox="0 0 1400 480" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#3EBD41"/><stop offset="22%" stop-color="#F3AD3B"/>
        <stop offset="42%" stop-color="#FC4D54"/><stop offset="62%" stop-color="#008FEC"/>
        <stop offset="100%" stop-color="#9013FE"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="5"/></filter>
      <filter id="glowBig"><feGaussianBlur stdDeviation="14"/></filter>
    </defs>
    <!-- Massive type as the hero -->
    <text x="700" y="290" text-anchor="middle" font-family="Oswald,sans-serif" font-weight="700" font-size="260" letter-spacing="-6" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.3)" stroke-width="1.5">BIG SUR</text>
    <!-- Route woven across the type -->
    <g id="routePath"></g>
    <g id="marks"></g>
    <!-- Small context labels -->
    <text x="80" y="40" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="2.2" fill="#F3AD3B">MARATHON · 26.2 MI · 2,153 FT ↑</text>
  </svg>
  <div class="sub">Route weaves through the letterforms · start on the left, finish on the right</div>
  <div class="sub2">Typographic Hero · E</div>
</div></div>
<script src="data.js"></script>
<script>
  var W=1400,H=480;
  var dense = LAB.densify(LAB.WAYPOINTS, 32);
  var proj = LAB.project(dense, W, H, { l:100,r:100,t:140,b:140 });
  var d = LAB.smoothPath(proj);
  document.getElementById('routePath').innerHTML =
    '<path d="'+d+'" fill="none" stroke="url(#route)" stroke-width="18" filter="url(#glowBig)" opacity=".65"/>' +
    '<path d="'+d+'" fill="none" stroke="url(#route)" stroke-width="7" filter="url(#glow)" opacity=".85"/>' +
    '<path d="'+d+'" fill="none" stroke="url(#route)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>';

  var series = LAB.buildSeries(dense);
  var COLORS = { start:'#3EBD41', peak:'#FC4D54', minor:'#008FEC', finish:'#9013FE' };
  var html = '';
  LAB.LANDMARKS.forEach(function(wp){
    var p = LAB.pointAtMi(proj, series.cum, wp.mi);
    var col = COLORS[wp.major] || '#F3AD3B';
    html += '<circle cx="'+p.x+'" cy="'+p.y+'" r="12" fill="'+col+'" opacity=".22"/>' +
            '<circle cx="'+p.x+'" cy="'+p.y+'" r="5" fill="'+col+'" stroke="#07090e" stroke-width="2"/>';
    if (wp.major==='peak'){
      html += '<text x="'+p.x+'" y="'+(p.y+30)+'" text-anchor="middle" fill="'+col+'" font-family="Oswald,sans-serif" font-size="12" font-weight="700" letter-spacing="2">'+wp.label+'</text>';
    }
  });
  document.getElementById('marks').innerHTML = html;
</script>
</body></html>
