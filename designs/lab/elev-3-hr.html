<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Elevation 3 · HR overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#0b1016; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:28px 32px; }
.hdr{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px; }
.eye{ font-family:var(--f-data); font-size:10px; letter-spacing:2.2px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
.ttl{ font-family:var(--f-display); font-size:30px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; margin-top:4px; }
svg{ display:block; width:100%; height:360px; }
.legend{ display:flex; gap:22px; margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,.07); font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
.legend span i{ display:inline-block; width:18px; height:3px; margin-right:6px; vertical-align:2px; }
.warn{ background:rgba(252,77,84,.08); border:1px solid rgba(252,77,84,.3); border-radius:8px; padding:14px 18px; margin-top:16px; display:flex; gap:10px; align-items:center; }
.warn .ic{ font-size:18px; }
.warn .tx{ font-family:var(--f-ui); font-size:13px; color:#fff; }
.warn .tx b{ color:#FC4D54; }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <div class="hdr"><div><div class="eye">Elevation · 3 · projected heart rate</div><div class="ttl">Elevation + HR trace</div></div></div>
  <svg id="svg" viewBox="0 0 1200 360" preserveAspectRatio="none">
    <defs>
      <linearGradient id="elevFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,.25)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <linearGradient id="hrGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FC4D54" stop-opacity=".8"/>
        <stop offset="100%" stop-color="#FC4D54" stop-opacity=".15"/>
      </linearGradient>
    </defs>
    <!-- HR zones as horizontal bands at top -->
    <rect x="0" y="0" width="1200" height="60" fill="#FC4D54" opacity=".05"/>
    <rect x="0" y="60" width="1200" height="60" fill="#F3AD3B" opacity=".05"/>
    <rect x="0" y="120" width="1200" height="60" fill="#3EBD41" opacity=".05"/>
    <text x="8" y="14" font-family="JetBrains Mono,monospace" font-size="9" fill="#FC4D54" font-weight="700">Z5 · 170+</text>
    <text x="8" y="74" font-family="JetBrains Mono,monospace" font-size="9" fill="#F3AD3B" font-weight="700">Z4 · 160–170</text>
    <text x="8" y="134" font-family="JetBrains Mono,monospace" font-size="9" fill="#3EBD41" font-weight="700">Z3 · 150–160</text>

    <path id="hrFill" fill="url(#hrGrad)" opacity=".7"/>
    <path id="hrLine" fill="none" stroke="#FC4D54" stroke-width="2.2"/>
    <path id="elevFill" fill="url(#elevFill)" opacity=".5"/>
    <path id="elevLine" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2" stroke-dasharray="4 3"/>
    <g id="marks"></g>
  </svg>
  <div class="legend">
    <span><i style="background:rgba(255,255,255,.7)"></i>Elevation</span>
    <span><i style="background:#FC4D54"></i>Projected HR</span>
    <span>Projection assumes 3:45 goal · trained base HR 152</span>
  </div>
  <div class="warn"><div class="ic">⚠️</div><div class="tx"><b>HR spike warning:</b> projected Z5 at mile 10.6 (Hurricane Point climb). Slow to 9:40/mi to stay Z4.</div></div>
</div></div>
<script src="data.js"></script>
<script>
  var W=1200,H=360;
  var dense = LAB.densify(LAB.WAYPOINTS, 36);
  var series = LAB.buildSeries(dense);
  var cum=series.cum, elev=series.elevFt, total=cum[cum.length-1];
  var maxE=Math.max.apply(null,elev), minE=Math.min.apply(null,elev), r=maxE-minE||1;

  var d='', fl='M 0 '+H;
  for (var i=0;i<dense.length;i++){
    var x = (cum[i]/total)*W;
    var y = 40 + (1 - (elev[i]-minE)/r)*(H-100);
    d += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    fl += ' L '+x.toFixed(1)+' '+y.toFixed(1);
  }
  fl += ' L '+W+' '+H+' Z';
  document.getElementById('elevLine').setAttribute('d', d);
  document.getElementById('elevFill').setAttribute('d', fl);

  // Projected HR: base 150 + elevation coupling + grade spike
  var hrD='', hrFl = 'M 0 '+H;
  var baseHR = 150, gainFactor = 0.12;
  for (var i=0;i<dense.length;i++){
    var x = (cum[i]/total)*W;
    var grad = i>0 ? (elev[i]-elev[i-1])/Math.max(cum[i]-cum[i-1],1e-6)/52.8 : 0;
    var hr = baseHR + (elev[i]-minE)*gainFactor + (grad>2?grad*3:0);
    // scale HR to chart: 140 = bottom, 180 = top
    var norm = (Math.min(hr,180)-140)/40;
    var y = 30 + (1 - norm)*(H-60);
    hrD += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    hrFl += ' L '+x.toFixed(1)+' '+y.toFixed(1);
  }
  hrFl += ' L '+W+' '+H+' Z';
  document.getElementById('hrLine').setAttribute('d', hrD);
  document.getElementById('hrFill').setAttribute('d', hrFl);

  var COLORS = { start:'#3EBD41', peak:'#FC4D54', minor:'#008FEC', finish:'#9013FE' };
  var html = '';
  LAB.LANDMARKS.forEach(function(wp){
    var x = (wp.mi/total)*W;
    var col = COLORS[wp.major]||'#F3AD3B';
    html += '<line x1="'+x+'" y1="0" x2="'+x+'" y2="'+H+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="2 4" opacity=".3"/>' +
            '<text x="'+x+'" y="'+(H-8)+'" text-anchor="middle" fill="'+col+'" font-family="Oswald,sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">'+wp.label+'</text>';
  });
  document.getElementById('marks').innerHTML = html;
</script>
</body></html>
