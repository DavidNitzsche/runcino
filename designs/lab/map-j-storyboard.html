<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Map J · Mile storyboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#07090e; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:28px; }
.hdr{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:22px; }
.eye{ font-family:var(--f-data); font-size:10px; letter-spacing:2.2px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
.ttl{ font-family:var(--f-display); font-size:30px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; margin-top:4px; }
.meta{ font-family:var(--f-data); font-size:10.5px; letter-spacing:1.6px; color:rgba(255,255,255,.6); text-transform:uppercase; font-weight:700; }
.strip{ display:grid; grid-template-columns:repeat(14,1fr); gap:6px; }
.mile{ background:#04060a; border-radius:6px; padding:10px 8px 12px; border-top:2px solid; position:relative; text-align:center; aspect-ratio:.62/1; }
.mile svg{ display:block; width:100%; height:40px; margin:6px 0 8px; }
.mi-n{ font-family:var(--f-data); font-size:9px; letter-spacing:1.2px; color:rgba(255,255,255,.5); text-transform:uppercase; font-weight:700; }
.mi-e{ font-family:var(--f-display); font-size:14px; font-weight:700; color:#fff; margin-top:2px; }
.mi-i{ font-size:14px; margin-top:4px; }
.row2{ margin-top:8px; }
.legend{ display:flex; gap:20px; margin-top:22px; font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
.legend span i{ display:inline-block; width:12px; height:3px; margin-right:6px; vertical-align:2px; }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <div class="hdr">
    <div><div class="eye">Storyboard · J</div><div class="ttl">Big Sur Marathon · mile by mile</div></div>
    <div class="meta">26.2 mi · 26 chapters</div>
  </div>
  <div class="strip" id="strip"></div>
  <div class="strip row2" id="strip2"></div>
  <div class="legend">
    <span><i style="background:#3EBD41"></i>Opening</span>
    <span><i style="background:#F3AD3B"></i>Climb</span>
    <span><i style="background:#FC4D54"></i>Peak</span>
    <span><i style="background:#008FEC"></i>Cruise</span>
    <span><i style="background:#9013FE"></i>Finish</span>
  </div>
</div></div>
<script src="data.js"></script>
<script>
  var dense = LAB.densify(LAB.WAYPOINTS, 36);
  var series = LAB.buildSeries(dense);
  var cum=series.cum, elev=series.elevFt, total=cum[cum.length-1];

  function eleAt(mi){
    var lo=0, hi=cum.length-1;
    while (lo<hi-1){ var m=(lo+hi)>>1; if (cum[m]<mi) lo=m; else hi=m; }
    var s=cum[hi]-cum[lo]||1e-9, t=(mi-cum[lo])/s;
    return elev[lo]+(elev[hi]-elev[lo])*t;
  }

  function phaseColor(mi){
    var pct = mi/total;
    for (var i=0;i<LAB.PHASES.length;i++) if (pct <= LAB.PHASES[i].pct) return LAB.PHASES[i].color;
    return LAB.PHASES[LAB.PHASES.length-1].color;
  }

  function icon(gain){
    if (gain > 100) return '⬆️';
    if (gain > 40) return '↗';
    if (gain < -100) return '⬇️';
    if (gain < -40) return '↘';
    return '→';
  }

  var tiles = [];
  for (var m=0; m<26; m++){
    var startE = eleAt(m), endE = eleAt(m+1);
    var gain = endE - startE;
    var col = phaseColor(m+0.5);
    // mini elevation sparkline
    var spk='';
    var samples=[]; for (var k=0;k<=10;k++) samples.push(eleAt(m + k/10));
    var mn = Math.min.apply(null, samples), mx = Math.max.apply(null, samples);
    var r = mx-mn||1;
    var d = '';
    samples.forEach(function(v,ix){
      var x = 4 + (ix/10)*52, y = 36 - ((v-mn)/r)*30;
      d += (ix===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    });
    spk = '<svg viewBox="0 0 60 40" preserveAspectRatio="none"><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round"/></svg>';
    tiles.push('<div class="mile" style="border-color:'+col+'">' +
      '<div class="mi-n">MI '+(m+1)+'</div>' +
      spk +
      '<div class="mi-e">'+Math.round(startE)+' ft</div>' +
      '<div class="mi-i">'+icon(gain)+'</div>' +
    '</div>');
  }
  // Split into 2 rows of 13 for layout
  document.getElementById('strip').innerHTML = tiles.slice(0,13).join('');
  document.getElementById('strip2').innerHTML = tiles.slice(13,26).join('') + '<div class="mile" style="border-color:#9013FE"><div class="mi-n">FINISH</div><div class="mi-i" style="font-size:22px;margin-top:14px;">🏁</div><div class="mi-e" style="margin-top:8px;">26.2</div></div>';
</script>
</body></html>
