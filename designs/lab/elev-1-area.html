<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Elevation 1 · Area + grade</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#0b1016; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:28px 32px; }
.hdr{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px; }
.eye{ font-family:var(--f-data); font-size:10px; letter-spacing:2.2px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
.ttl{ font-family:var(--f-display); font-size:30px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; margin-top:4px; }
.peak{ font-family:var(--f-data); font-size:10.5px; letter-spacing:1.6px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
svg{ display:block; width:100%; height:320px; }
.axis{ display:flex; justify-content:space-between; font-family:var(--f-data); font-size:9.5px; letter-spacing:1.4px; color:rgba(255,255,255,.4); text-transform:uppercase; margin-top:10px; font-weight:700; }
.legend{ display:flex; gap:18px; margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,.07); font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
.legend span i{ display:inline-block; width:14px; height:10px; border-radius:2px; margin-right:6px; vertical-align:-1px; }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <div class="hdr"><div><div class="eye">Elevation · 1 · area + grade fill</div><div class="ttl">Big Sur elevation profile</div></div><div class="peak">Peak 568 ft · mi 10.6</div></div>
  <svg id="svg" viewBox="0 0 1200 320" preserveAspectRatio="none">
    <defs>
      <linearGradient id="gradeFill" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#60a5fa"/>
        <stop offset="18%" stop-color="#fbbf24"/>
        <stop offset="38%" stop-color="#f97316"/>
        <stop offset="48%" stop-color="#e11d48"/>
        <stop offset="58%" stop-color="#34d399"/>
        <stop offset="100%" stop-color="#10b981"/>
      </linearGradient>
    </defs>
    <g stroke="rgba(255,255,255,.05)" stroke-dasharray="2 4">
      <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/>
    </g>
    <path id="fill" fill="url(#gradeFill)" opacity=".7"/>
    <path id="line" fill="none" stroke="#fff" stroke-width="2"/>
    <g id="marks"></g>
    <g id="yaxis" font-family="JetBrains Mono,monospace" font-size="10" fill="rgba(255,255,255,.45)" font-weight="700">
      <text x="6" y="14">600 ft</text><text x="6" y="86">400 ft</text><text x="6" y="166">200 ft</text><text x="6" y="246">0 ft</text>
    </g>
  </svg>
  <div class="axis"><span>0</span><span>5 mi</span><span>10 mi</span><span>15 mi</span><span>20 mi</span><span>26.2 mi</span></div>
  <div class="legend">
    <span><i style="background:#60a5fa"></i>Flat</span>
    <span><i style="background:#fbbf24"></i>Rolling</span>
    <span><i style="background:#f97316"></i>Climb</span>
    <span><i style="background:#e11d48"></i>Steep climb</span>
    <span><i style="background:#34d399"></i>Descent</span>
    <span><i style="background:#10b981"></i>Steep descent</span>
  </div>
</div></div>
<script src="data.js"></script>
<script>
  var W=1200,H=320;
  var dense = LAB.densify(LAB.WAYPOINTS, 36);
  var series = LAB.buildSeries(dense);
  var cum=series.cum, elev=series.elevFt, total=cum[cum.length-1];
  var maxE=Math.max.apply(null,elev), minE=Math.min.apply(null,elev), r=maxE-minE||1;

  var d='', fl='M 0 '+H;
  for (var i=0;i<dense.length;i++){
    var x = (cum[i]/total)*W;
    var y = 30 + (1 - (elev[i]-minE)/r)*(H-60);
    d += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    fl += ' L '+x.toFixed(1)+' '+y.toFixed(1);
  }
  fl += ' L '+W+' '+H+' Z';
  document.getElementById('line').setAttribute('d', d);
  document.getElementById('fill').setAttribute('d', fl);

  var COLORS = { start:'#3EBD41', peak:'#FC4D54', minor:'#008FEC', finish:'#9013FE' };
  var html = '';
  LAB.LANDMARKS.forEach(function(wp){
    var x = (wp.mi/total)*W;
    var lo=0, hi=cum.length-1;
    while (lo<hi-1){ var m=(lo+hi)>>1; if (cum[m]<wp.mi) lo=m; else hi=m; }
    var span=cum[hi]-cum[lo]||1e-9, t=(wp.mi-cum[lo])/span;
    var e = elev[lo]+(elev[hi]-elev[lo])*t;
    var y = 30 + (1 - (e-minE)/r)*(H-60);
    var col = COLORS[wp.major]||'#F3AD3B';
    html += '<line x1="'+x+'" y1="'+y+'" x2="'+x+'" y2="'+H+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="2 3" opacity=".5"/>' +
            '<circle cx="'+x+'" cy="'+y+'" r="5" fill="'+col+'" stroke="#0b1016" stroke-width="2"/>' +
            '<text x="'+x+'" y="'+(y-12)+'" text-anchor="middle" fill="'+col+'" font-family="Oswald,sans-serif" font-size="11" font-weight="700" letter-spacing="1.6">'+wp.label+'</text>';
  });
  document.getElementById('marks').innerHTML = html;
</script>
</body></html>
