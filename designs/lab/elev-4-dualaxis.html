<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Elevation 4 · Pace × elevation</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#0b1016; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:28px 32px; }
.hdr{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px; }
.eye{ font-family:var(--f-data); font-size:10px; letter-spacing:2.2px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
.ttl{ font-family:var(--f-display); font-size:30px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; margin-top:4px; }
svg{ display:block; width:100%; height:360px; }
.legend{ display:flex; gap:22px; margin-top:18px; padding-top:16px; border-top:1px solid rgba(255,255,255,.07); font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
.legend span i{ display:inline-block; width:18px; height:3px; margin-right:6px; vertical-align:2px; }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <div class="hdr"><div><div class="eye">Elevation · 4 · dual axis (pace × terrain)</div><div class="ttl">Target pace where terrain demands it</div></div></div>
  <svg id="svg" viewBox="0 0 1200 360" preserveAspectRatio="none">
    <defs>
      <linearGradient id="elevF" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(246,247,248,.12)"/>
        <stop offset="100%" stop-color="rgba(246,247,248,0)"/>
      </linearGradient>
      <linearGradient id="pace" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#3EBD41"/><stop offset="22%" stop-color="#F3AD3B"/>
        <stop offset="42%" stop-color="#FC4D54"/><stop offset="62%" stop-color="#008FEC"/>
        <stop offset="100%" stop-color="#9013FE"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
    </defs>
    <g stroke="rgba(255,255,255,.05)" stroke-dasharray="2 4">
      <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="270" x2="1200" y2="270"/>
    </g>
    <!-- elevation in background -->
    <path id="elevFill" fill="url(#elevF)"/>
    <path id="elevLine" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
    <!-- pace in foreground with glow -->
    <path id="paceGlow" fill="none" stroke="url(#pace)" stroke-width="8" opacity=".5" filter="url(#glow)"/>
    <path id="paceLine" fill="none" stroke="url(#pace)" stroke-width="2.5"/>
    <g id="marks"></g>
    <!-- pace call-outs -->
    <g id="paceLabels" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" fill="#fff"></g>
  </svg>
  <div class="legend">
    <span><i style="background:rgba(255,255,255,.35)"></i>Elevation (ft, right axis)</span>
    <span><i style="background:linear-gradient(90deg,#3EBD41,#FC4D54,#9013FE);height:3px;width:28px;"></i>Target pace (min/mi, left axis)</span>
    <span>Goal · 3:45 total</span>
  </div>
</div></div>
<script src="data.js"></script>
<script>
  var W=1200,H=360;
  var dense = LAB.densify(LAB.WAYPOINTS, 36);
  var series = LAB.buildSeries(dense);
  var cum=series.cum, elev=series.elevFt, total=cum[cum.length-1];
  var maxE=Math.max.apply(null,elev), minE=Math.min.apply(null,elev), r=maxE-minE||1;

  var d='', fl='M 0 '+H;
  for (var i=0;i<dense.length;i++){
    var x = (cum[i]/total)*W;
    var y = 40 + (1 - (elev[i]-minE)/r)*(H-100);
    d += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    fl += ' L '+x.toFixed(1)+' '+y.toFixed(1);
  }
  fl += ' L '+W+' '+H+' Z';
  document.getElementById('elevLine').setAttribute('d', d);
  document.getElementById('elevFill').setAttribute('d', fl);

  // Pace line (grade-adjusted)
  var paceBase = 8.57; // 3:45 pace = 8:34/mi
  var paceD = '';
  for (var i=0;i<dense.length;i++){
    var x = (cum[i]/total)*W;
    var grade = i>0 ? (elev[i]-elev[i-1])/(Math.max(cum[i]-cum[i-1],1e-6)*5280)*100 : 0;
    // rough GAF: each +% grade adds .15 min/mi, each -% subtracts .08
    var paceMin = paceBase + (grade>0 ? grade*0.15 : grade*0.08);
    paceMin = Math.max(7.5, Math.min(11, paceMin));
    // 7.5min = bottom, 11min = top
    var norm = (paceMin - 7.5)/3.5;
    var y = 30 + norm*(H-60);
    paceD += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
  }
  document.getElementById('paceLine').setAttribute('d', paceD);
  document.getElementById('paceGlow').setAttribute('d', paceD);

  var COLORS = { start:'#3EBD41', peak:'#FC4D54', minor:'#008FEC', finish:'#9013FE' };
  var html='', pl='';
  [
    { mi:2, txt:'8:30' }, { mi:7, txt:'9:05' }, { mi:10.6, txt:'9:40' },
    { mi:13, txt:'8:15' }, { mi:18, txt:'8:25' }, { mi:24, txt:'8:20' }
  ].forEach(function(p){
    var x = (p.mi/total)*W;
    pl += '<text x="'+x+'" y="28" text-anchor="middle" fill="#fff" style="font-size:11px">'+p.txt+'</text>';
  });
  document.getElementById('paceLabels').innerHTML = pl;

  LAB.LANDMARKS.forEach(function(wp){
    var x = (wp.mi/total)*W;
    var col = COLORS[wp.major]||'#F3AD3B';
    html += '<line x1="'+x+'" y1="40" x2="'+x+'" y2="'+(H-10)+'" stroke="'+col+'" stroke-width="1" stroke-dasharray="2 4" opacity=".3"/>' +
            '<text x="'+x+'" y="'+(H-2)+'" text-anchor="middle" fill="'+col+'" font-family="Oswald,sans-serif" font-size="10" font-weight="700" letter-spacing="1.6">'+wp.label+'</text>';
  });
  document.getElementById('marks').innerHTML = html;
</script>
</body></html>
