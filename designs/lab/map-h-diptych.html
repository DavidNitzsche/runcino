<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Map H · Diptych</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#07090e; border:1px solid rgba(255,255,255,.08); border-radius:16px; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; }
.pane{ padding:28px 28px; position:relative; min-height:520px; }
.pane + .pane{ border-left:1px solid rgba(255,255,255,.08); }
.eye{ font-family:var(--f-data); font-size:10px; letter-spacing:2.2px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
.ttl{ font-family:var(--f-display); font-size:26px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; margin-top:4px; margin-bottom:18px; }
svg{ display:block; width:100%; height:420px; }
.caption{ margin-top:18px; font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.5); text-transform:uppercase; font-weight:700; }
.meta{ display:flex; gap:20px; margin-top:14px; font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.55); text-transform:uppercase; font-weight:700; }
.meta b{ color:#fff; font-weight:700; }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <div class="pane">
    <div class="eye">Plan view</div>
    <div class="ttl">Looking down</div>
    <svg id="plan" viewBox="0 0 600 420" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="routeP" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3EBD41"/><stop offset="22%" stop-color="#F3AD3B"/>
          <stop offset="42%" stop-color="#FC4D54"/><stop offset="62%" stop-color="#008FEC"/>
          <stop offset="100%" stop-color="#9013FE"/>
        </linearGradient>
        <filter id="glowP"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>
      <g id="planRoute"></g>
      <g id="planMarks"></g>
    </svg>
    <div class="meta"><span>Geography · <b>26.27 mi</b></span><span>Azimuth · <b>340°N</b></span></div>
  </div>
  <div class="pane">
    <div class="eye">Cross-section</div>
    <div class="ttl">Side profile</div>
    <svg id="elev" viewBox="0 0 600 420" preserveAspectRatio="none">
      <defs>
        <linearGradient id="routeE" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#3EBD41"/><stop offset="22%" stop-color="#F3AD3B"/>
          <stop offset="42%" stop-color="#FC4D54"/><stop offset="62%" stop-color="#008FEC"/>
          <stop offset="100%" stop-color="#9013FE"/>
        </linearGradient>
        <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(255,255,255,.15)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
      </defs>
      <g stroke="rgba(255,255,255,.05)" stroke-dasharray="2 4">
        <line x1="0" y1="100" x2="600" y2="100"/>
        <line x1="0" y1="200" x2="600" y2="200"/>
        <line x1="0" y1="300" x2="600" y2="300"/>
      </g>
      <path id="elevFill" fill="url(#fill)"/>
      <path id="elevLine" fill="none" stroke="url(#routeE)" stroke-width="2.5"/>
      <g id="elevMarks"></g>
    </svg>
    <div class="meta"><span>Peak · <b>568 ft</b></span><span>Total climb · <b>+2,153 ft</b></span></div>
  </div>
</div></div>
<script src="data.js"></script>
<script>
  var dense = LAB.densify(LAB.WAYPOINTS, 30);
  var series = LAB.buildSeries(dense);
  var cum = series.cum, elev = series.elevFt, total = cum[cum.length-1];

  // Plan view
  var proj = LAB.project(dense, 600, 420, { l:50,r:50,t:50,b:50 });
  document.getElementById('planRoute').innerHTML =
    '<path d="'+LAB.smoothPath(proj)+'" fill="none" stroke="url(#routeP)" stroke-width="8" filter="url(#glowP)" opacity=".6"/>' +
    '<path d="'+LAB.smoothPath(proj)+'" fill="none" stroke="url(#routeP)" stroke-width="2.5"/>';
  var COLORS = { start:'#3EBD41', peak:'#FC4D54', minor:'#008FEC', finish:'#9013FE' };
  var pm = '';
  LAB.LANDMARKS.forEach(function(wp){
    var p = LAB.pointAtMi(proj, cum, wp.mi);
    var c = COLORS[wp.major]||'#F3AD3B';
    pm += '<circle cx="'+p.x+'" cy="'+p.y+'" r="5" fill="'+c+'" stroke="#07090e" stroke-width="2"/>';
  });
  document.getElementById('planMarks').innerHTML = pm;

  // Cross section: elevation as area + line
  var W=600,H=420, pad=30;
  var maxE = Math.max.apply(null, elev), minE = Math.min.apply(null, elev);
  var range = maxE-minE||1;
  var d = '', fl = 'M '+pad+' '+(H-pad);
  for (var i=0;i<dense.length;i++){
    var x = pad + (cum[i]/total)*(W-2*pad);
    var y = (H-pad) - ((elev[i]-minE)/range)*(H-2*pad-50);
    d += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
    fl += ' L '+x.toFixed(1)+' '+y.toFixed(1);
  }
  fl += ' L '+(W-pad)+' '+(H-pad)+' Z';
  document.getElementById('elevLine').setAttribute('d', d);
  document.getElementById('elevFill').setAttribute('d', fl);

  var em = '';
  LAB.LANDMARKS.forEach(function(wp){
    var x = pad + (wp.mi/total)*(W-2*pad);
    var t = wp.mi/total, lo=0, hi=cum.length-1;
    // find interpolated y
    var target = (wp.mi)/total*total; // = wp.mi
    while (lo<hi-1){ var mm=(lo+hi)>>1; if (cum[mm]<wp.mi) lo=mm; else hi=mm; }
    var span=cum[hi]-cum[lo]||1e-9, tt=(wp.mi-cum[lo])/span;
    var e = elev[lo]+(elev[hi]-elev[lo])*tt;
    var y = (H-pad) - ((e-minE)/range)*(H-2*pad-50);
    var c = COLORS[wp.major]||'#F3AD3B';
    em += '<line x1="'+x+'" y1="'+y+'" x2="'+x+'" y2="'+(H-pad)+'" stroke="'+c+'" stroke-width="1" stroke-dasharray="2 3" opacity=".5"/>' +
          '<circle cx="'+x+'" cy="'+y+'" r="5" fill="'+c+'" stroke="#07090e" stroke-width="2"/>';
  });
  document.getElementById('elevMarks').innerHTML = em;
</script>
</body></html>
