<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=1400">
<title>Elevation 5 · Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Jost:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{ background:#0a0d12; }
.frame{ max-width:1440px; margin:22px auto; padding:0 44px; }
.card{ background:#0b1016; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:36px 44px; }
.hdr{ margin-bottom:38px; }
.eye{ font-family:var(--f-data); font-size:10px; letter-spacing:2.2px; color:#F3AD3B; text-transform:uppercase; font-weight:700; }
.ttl{ font-family:var(--f-display); font-size:32px; font-weight:700; text-transform:uppercase; letter-spacing:-.01em; margin-top:4px; }
.intro{ color:rgba(255,255,255,.6); font-size:13px; margin-top:10px; max-width:700px; line-height:1.6; }
svg{ display:block; width:100%; height:280px; }
.footnote{ margin-top:38px; display:flex; justify-content:space-between; font-family:var(--f-data); font-size:10px; letter-spacing:1.4px; color:rgba(255,255,255,.45); text-transform:uppercase; font-weight:700; padding-top:22px; border-top:1px solid rgba(255,255,255,.08); }
</style></head><body>
<a class="lab-back" href="index.html" style="display:block;max-width:1440px;margin:22px auto 0;padding:0 44px;">← ALL DIRECTIONS</a>
<div class="frame"><div class="card">
  <div class="hdr">
    <div class="eye">Elevation · 5 · minimal</div>
    <div class="ttl">The climbs, named.</div>
    <div class="intro">Three peaks and one valley define the Big Sur race. The rest of the course is either recovery or rhythm. Here's what the terrain asks of you.</div>
  </div>
  <svg id="svg" viewBox="0 0 1200 280" preserveAspectRatio="none">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
    </defs>
    <path id="line" fill="none" stroke="#F3AD3B" stroke-width="1.8" opacity=".9"/>
    <g id="labels"></g>
  </svg>
  <div class="footnote"><span>Start · Big Sur Station · 20 ft</span><span>Finish · Carmel · 12 ft</span></div>
</div></div>
<script src="data.js"></script>
<script>
  var W=1200,H=280;
  var dense = LAB.densify(LAB.WAYPOINTS, 36);
  var series = LAB.buildSeries(dense);
  var cum=series.cum, elev=series.elevFt, total=cum[cum.length-1];
  var maxE=Math.max.apply(null,elev), minE=Math.min.apply(null,elev), r=maxE-minE||1;

  var d='';
  for (var i=0;i<dense.length;i++){
    var x = (cum[i]/total)*W;
    var y = 80 + (1 - (elev[i]-minE)/r)*(H-140);
    d += (i===0?'M ':'L ')+x.toFixed(1)+' '+y.toFixed(1)+' ';
  }
  document.getElementById('line').setAttribute('d', d);

  // Editorial callouts
  var callouts = [
    { mi:0, t:'START',  sub:'mi 0 · 20 ft', side:'above', minor:true },
    { mi:10.6, t:'HURRICANE POINT', sub:'mi 10.6 · 568 ft · +520 ft over 2 mi', side:'above' },
    { mi:13.1, t:'HALFWAY',   sub:'mi 13.1 · 415 ft · descent begins', side:'below' },
    { mi:20, t:'WALL',    sub:'mi 20 · 90 ft · rolling comeback', side:'above', minor:true },
    { mi:26.2, t:'FINISH',  sub:'mi 26.2 · 12 ft · net −8 ft', side:'below', minor:true }
  ];
  function yAt(mi){
    var lo=0,hi=cum.length-1;
    while (lo<hi-1){ var m=(lo+hi)>>1; if (cum[m]<mi) lo=m; else hi=m; }
    var span=cum[hi]-cum[lo]||1e-9, t=(mi-cum[lo])/span;
    var e = elev[lo]+(elev[hi]-elev[lo])*t;
    return 80 + (1 - (e-minE)/r)*(H-140);
  }
  var html = '';
  callouts.forEach(function(c){
    var x = (c.mi/total)*W;
    var y = yAt(c.mi);
    var ty, sub_ty;
    if (c.side==='above'){ ty = y-20; sub_ty = y-8; }
    else { ty = y+20; sub_ty = y+34; }
    var col = c.minor ? 'rgba(255,255,255,.55)' : '#F3AD3B';
    html += '<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="'+col+'"/>' +
            '<line x1="'+x+'" y1="'+y+'" x2="'+x+'" y2="'+(c.side==='above'?ty+4:ty-14)+'" stroke="'+col+'" stroke-width="1" opacity=".4" stroke-dasharray="2 3"/>' +
            '<text x="'+x+'" y="'+ty+'" text-anchor="middle" fill="'+col+'" font-family="Oswald,sans-serif" font-size="'+(c.minor?11:14)+'" font-weight="700" letter-spacing="'+(c.minor?1.4:2)+'">'+c.t+'</text>' +
            '<text x="'+x+'" y="'+sub_ty+'" text-anchor="middle" fill="rgba(255,255,255,.45)" font-family="JetBrains Mono,monospace" font-size="10" font-weight="500">'+c.sub+'</text>';
  });
  document.getElementById('labels').innerHTML = html;
</script>
</body></html>
