# Nightly defensive absorber sweep.
#
# The absorber fires from every known ingest path (watch, HK workout,
# Strava webhook, manual) but race conditions, silent failures, and
# edge clustering cases leave occasional duplicate rows surviving as
# canonical siblings of the same physical run.
#
# This cron runs autoMergeRecent for every active user over the last
# 14 days. Idempotent · safe to run repeatedly. Catches anything the
# ingest-time absorber missed.
#
# Companion to the broader read-time defense: every aggregation site
# also uses MAX-per-day dedupe (see lib/plan/generate.ts,
# lib/coach/training-form.ts, etc). This cron is the preventive
# cleanup so reads stay fast and chip-level provenance remains
# accurate.
#
# Schedule: 10:00 UTC daily = 03:00 PT · after the strava-sync cron
# finishes ingesting yesterday's webhook backfills.
#
# Manual trigger: Actions tab > "Dedupe runs" > Run workflow.

name: Dedupe runs

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: {}

jobs:
  dedupe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/dedupe-runs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # 2026-06-04 · SITE_URL secret was missing from repo settings ·
          # workflow exited immediately every day. Hardcoded prod URL to
          # match the promote-courses workflow pattern · removes the
          # dependency on a secret that's easy to forget to set.
          if [ -z "${CRON_SECRET:-}" ]; then echo "::error::CRON_SECRET secret missing"; exit 1; fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -w "\n__STATUS__:%{http_code}" \
            --max-time 150 \
            https://www.faff.run/api/cron/dedupe-runs)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1 | sed 's/__STATUS__://')
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Dedupe failed with HTTP $status"
            exit 1
          fi
          # Warn on per-user errors but don't fail the workflow · the
          # cron is idempotent and re-runs daily, so a transient user
          # failure gets retried tomorrow.
          if ! echo "$body" | grep -q '"ok":true'; then
            echo "::warning::Per-user error in dedupe sweep · response not ok=true · see body above"
          fi
