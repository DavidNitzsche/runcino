# Nightly defensive absorber sweep.
#
# The absorber fires from every known ingest path (watch, HK workout,
# Strava webhook, manual) but race conditions, silent failures, and
# edge clustering cases leave occasional duplicate rows surviving as
# canonical siblings of the same physical run.
#
# This cron runs autoMergeRecent for every active user over the last
# 14 days. Idempotent · safe to run repeatedly. Catches anything the
# ingest-time absorber missed.
#
# Companion to the broader read-time defense: every aggregation site
# also uses MAX-per-day dedupe (see lib/plan/generate.ts,
# lib/coach/training-form.ts, etc). This cron is the preventive
# cleanup so reads stay fast and chip-level provenance remains
# accurate.
#
# Schedule: 10:00 UTC daily = 03:00 PT · after the strava-sync cron
# finishes ingesting yesterday's webhook backfills.
#
# Manual trigger: Actions tab > "Dedupe runs" > Run workflow.

name: Dedupe runs

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: {}

jobs:
  dedupe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/cron/dedupe-runs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ]; then echo "SITE_URL secret missing"; exit 1; fi
          if [ -z "${CRON_SECRET:-}" ]; then echo "CRON_SECRET secret missing"; exit 1; fi
          response=$(curl -sS -w "\nHTTP %{http_code}\n" -X POST "${SITE_URL%/}/api/cron/dedupe-runs" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "$response"
          echo "$response" | grep -q '"ok":true' || { echo "Dedupe response not ok"; exit 1; }
