# Daily plan adaptation triggers (P38).
#
# 2026-06-04 · moved from 07:15 UTC (00:15 PT) to 03:00 UTC (20:00 PT)
# per David's "I dont want to wake up to change runs · that was
# annoying." Cron now fires in the evening · readiness_pullback
# triggers write plan_workout_proposals (status='pending') instead of
# mutating plan_workouts directly. Runner sees the proposal banner on
# Today view BEFORE going to sleep, can accept ("LET IT HAPPEN") or
# dismiss ("KEEP ORIGINAL"). No more morning surprises.
#
# Reactive triggers (missed_key_workout, niggle, sick, injury, pr_bank,
# goal_changed, volume_overshoot) still apply immediately · those are
# responses to events that already happened.

name: Run plan adaptations

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  adapt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/run-adaptations
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret not configured"
            exit 1
          fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w "\n__STATUS__:%{http_code}" \
            https://www.faff.run/api/cron/run-adaptations)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1 | sed 's/__STATUS__://')
          echo "Status: $status"
          echo "Body: $body"
          [ "$status" = "200" ] || exit 1
