# Daily plan adaptation triggers (P38).
# 07:15 UTC = 00:15 PT — between briefing-refresh (07:05) and
# weather-enrich (07:30). Order matters: adaptation has to land
# BEFORE the morning briefing reads the plan.

name: Run plan adaptations

on:
  schedule:
    - cron: '15 7 * * *'
  workflow_dispatch: {}

jobs:
  adapt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/run-adaptations
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret not configured"
            exit 1
          fi
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w "\n__STATUS__:%{http_code}" \
            https://www.faff.run/api/cron/run-adaptations)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1 | sed 's/__STATUS__://')
          echo "Status: $status"
          echo "Body: $body"
          [ "$status" = "200" ] || exit 1
