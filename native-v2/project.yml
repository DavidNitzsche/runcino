# XcodeGen project spec for faff.run v2 iOS app.
# Regenerate with: xcodegen generate

name: Faff
options:
  bundleIdPrefix: run.faff
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: bottom
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "F26TM6BCR3"
    CODE_SIGN_STYLE: "Automatic"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  Faff:
    type: application
    platform: iOS
    sources:
      - path: Faff/Faff
        excludes:
          - "**/.DS_Store"
    info:
      path: Faff/Faff/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: faff
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: run.faff.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
