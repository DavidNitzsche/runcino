# XcodeGen project spec for faff.run v2 iOS app.
# Regenerate with: xcodegen generate

name: Faff
options:
  bundleIdPrefix: run.faff
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: bottom
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "F26TM6BCR3"
    CODE_SIGN_STYLE: "Automatic"
    MARKETING_VERSION: "3.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES

targets:
  Faff:
    type: application
    platform: iOS
    sources:
      - path: Faff/Faff
        excludes:
          - "**/.DS_Store"
          # Fonts handled by the dedicated entry below to ensure
          # xcodegen places them in Copy Bundle Resources.
          - "Resources/Fonts/**"
      # v3 typography (2026-05-28 cutover) — TTFs ride in as a separate
      # source group so xcodegen wires them into Copy Bundle Resources
      # without a custom buildPhase block. .ttf files are auto-routed to
      # the resources phase by xcodegen's file-type heuristic.
      - path: Faff/Faff/Resources/Fonts
        type: folder
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
    info:
      path: Faff/Faff/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleDisplayName: faff
        ITSAppUsesNonExemptEncryption: false
        # READ ONLY on the iPhone (the watch does HK writes), but Apple
        # validates Info.plist against the HealthKit ENTITLEMENT, not
        # against code-path usage — both strings must exist or the upload
        # gets ITMS-90683 ("missing purpose string"). P27.8 attempted to
        # drop the Update string for hygiene; build 79 upload was rejected.
        # Restoring with an honest "watch-only" framing.
        NSHealthShareUsageDescription: "Faff reads HR, HRV, sleep, VO2max, and workouts from Apple Health to compute training zones and adapt your plan."
        NSHealthUpdateUsageDescription: "Faff Watch writes completed workouts to Apple Health so your training history stays in one place."
        # v3 fonts registration · TTFs live in Faff/Faff/Resources/Fonts.
        # Must match the actual filenames in Copy Bundle Resources or
        # iOS skips them at registration time.
        UIAppFonts:
          - Anton-Regular.ttf
          - Oswald-Light.ttf
          - Oswald-Regular.ttf
          - Oswald-Medium.ttf
          - Oswald-SemiBold.ttf
          - Oswald-Bold.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - Inter-ExtraBold.ttf
        # Strava OAuth callback scheme · the redirect URI on the auth
        # server is `faff://strava-oauth/callback`. Was lost when an
        # earlier xcodegen regen ran without this block · restored
        # 2026-05-31 so any future regen preserves it.
        CFBundleURLTypes:
          - CFBundleURLName: run.faff.strava-oauth
            CFBundleURLSchemes:
              - faff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: run.faff.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # HealthKit entitlement REQUIRED because Info.plist declares
        # NSHealthShareUsageDescription / NSHealthUpdateUsageDescription.
        # Without the matching entitlement, iOS kills the app at launch
        # on real devices. Build 72 and 73 crashed exactly here — sim
        # didn't reproduce because sim doesn't enforce entitlements.
        CODE_SIGN_ENTITLEMENTS: Faff/Faff/Faff.entitlements
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: NO
    dependencies:
      - target: FaffWatch Watch App
        embed: true
        codeSign: true

  # iOS unit tests · hosted inside the Faff app so @testable import Faff
  # has visibility into internal types (TokenStore, API, SignInView, etc.).
  # Added 2026-05-31 with SignInFlowTests · the sign-in / Bearer-attach probe.
  FaffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Faff/FaffTests
        excludes:
          - "**/.DS_Store"
    info:
      path: Faff/FaffTests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: run.faff.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Faff.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Faff"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "5.9"
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: NO
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: Faff

  # Apple Watch companion app — sources live in legacy/ for now, symlinked in
  # by scripts/ship-testflight-v2.sh. Bundle id MUST be <iOSbundle>.watchkitapp
  # per Apple's WatchKit single-target convention (post-2020).
  FaffWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: Faff/FaffWatch Watch App
        excludes:
          - "**/.DS_Store"
    info:
      path: Faff/FaffWatch Watch App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: faff
        WKApplication: true
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: run.faff.app
        # REQUIRED for HKWorkoutSession — without workout-processing the
        # session fails / the app suspends on wrist-down mid-run. The
        # legacy project carried this in FaffWatch-Watch-App-Info.plist
        # (b051a523); the v2 cutover lost it because xcodegen regenerates
        # the watch plist from THIS block. Audit RK-1 (2026-06-09).
        WKBackgroundModes:
          - workout-processing
        # Required: the watch uses HKWorkoutSession + HKWorkoutRouteBuilder
        # + CLLocationManager. Apple rejects ITMS-90683 without these.
        NSHealthShareUsageDescription: "Faff reads heart rate, HRV, calories, and workout data from Apple Health to coach your training."
        NSHealthUpdateUsageDescription: "Faff writes completed workouts to Apple Health so your training history stays in one place."
        NSLocationWhenInUseUsageDescription: "Faff records your route during workouts so you can see where you ran."
        NSMotionUsageDescription: "Faff uses motion data to track cadence, stride length, and other running form metrics."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: run.faff.app.watchkitapp
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SUPPORTS_MACCATALYST: NO
        SWIFT_VERSION: "5.0"
        # Watch app code was authored against the legacy proj which set
        # SWIFT_DEFAULT_ACTOR_ISOLATION=MainActor. Without that, Xcode 17's
        # default strict concurrency rejects the cross-actor reads.
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_UPCOMING_FEATURE_STRICT_CONCURRENCY: NO
        # HealthKit entitlement REQUIRED — watch uses HKWorkoutSession +
        # HKWorkoutRouteBuilder. Entitlements file is the canonical one
        # at legacy/native/Faff/FaffWatch Watch App/FaffWatch Watch App.entitlements
        # (same dir as the source — symlinked in by ship-testflight-v2.sh).
        CODE_SIGN_ENTITLEMENTS: Faff/FaffWatch Watch App/FaffWatch Watch App.entitlements
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: run.faff.app
        INFOPLIST_KEY_CFBundleDisplayName: faff
