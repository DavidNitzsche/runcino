<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>faff · tester watch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8ff47;
    --race: #ff3c3c;
    --active: #3cf;
    --warn: #f90;
    --pass: #4caf50;
    --fail: #f44336;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 32px 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
  }
  header h1 {
    font-family: 'Oswald', -apple-system, sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header .subtitle { color: var(--muted); font-size: 12px; }

  /* ── Token gate ──────────────────────────────────────────────── */
  #token-gate {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 520px;
    margin-bottom: 24px;
  }
  #token-gate p { color: var(--muted); margin-bottom: 12px; font-size: 13px; }
  #token-gate .how { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  #token-gate .how code { color: var(--active); font-family: var(--font-mono); }
  .row { display: flex; gap: 8px; }
  input[type=text], input[type=password] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-weight: 400;
  }
  button.ghost:hover { border-color: var(--text); color: var(--text); }

  /* ── Toolbar ─────────────────────────────────────────────────── */
  #toolbar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  #toolbar.visible { display: flex; }
  #toolbar .ts { margin-left: auto; color: var(--muted); font-size: 12px; }
  #toolbar .email-filter {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    width: 240px;
  }

  /* ── Tester card ─────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-head {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 36px; height: 36px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }
  .card-head .info { flex: 1; }
  .card-head .name { font-weight: 600; font-size: 15px; }
  .card-head .email { color: var(--muted); font-size: 12px; font-family: var(--font-mono); }
  .card-head .badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge {
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    text-transform: uppercase;
  }
  .badge-onboarded { background: color-mix(in srgb, var(--pass) 18%, transparent); color: var(--pass); border: 1px solid color-mix(in srgb, var(--pass) 30%, transparent); }
  .badge-pending { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent); }
  .badge-strava { background: color-mix(in srgb, #fc4c02 15%, transparent); color: #fc6a2a; border: 1px solid color-mix(in srgb, #fc4c02 25%, transparent); }
  .badge-hk { background: color-mix(in srgb, var(--race) 15%, transparent); color: #ff7070; border: 1px solid color-mix(in srgb, var(--race) 25%, transparent); }
  .badge-skipped { background: color-mix(in srgb, var(--muted) 15%, transparent); color: var(--muted); border: 1px solid var(--border); }

  .card-body { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  @media (max-width: 900px) { .card-body { grid-template-columns: 1fr; } }

  .section {
    padding: 16px 20px;
    border-right: 1px solid var(--border);
  }
  .section:last-child { border-right: none; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .kv { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .kv .k { color: var(--muted); font-size: 12px; }
  .kv .v { font-size: 12px; font-weight: 500; text-align: right; font-family: var(--font-mono); }
  .kv .v.hi { color: var(--accent); }
  .kv .v.muted { color: var(--muted); }

  /* ── Doctrine checks ─────────────────────────────────────────── */
  .checks { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; }
  .check {
    border-radius: 6px;
    font-size: 11px;
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .check-pass { background: color-mix(in srgb, var(--pass) 12%, transparent); border: 1px solid color-mix(in srgb, var(--pass) 25%, transparent); color: var(--pass); }
  .check-fail { background: color-mix(in srgb, var(--fail) 12%, transparent); border: 1px solid color-mix(in srgb, var(--fail) 25%, transparent); color: var(--fail); }
  .check-icon { font-size: 10px; }

  /* ── Plan ramp sparkline ─────────────────────────────────────── */
  .ramp { display: flex; align-items: flex-end; gap: 3px; height: 28px; margin-top: 8px; }
  .ramp-bar { background: var(--active); border-radius: 2px 2px 0 0; min-width: 8px; opacity: 0.7; transition: opacity 0.15s; }
  .ramp-bar:hover { opacity: 1; }

  /* ── Empty / loading / error ─────────────────────────────────── */
  .message {
    color: var(--muted);
    padding: 40px;
    text-align: center;
    font-size: 13px;
  }
  .error { color: var(--fail); }

  /* ── Separator ───────────────────────────────────────────────── */
  .sep { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
</style>
</head>
<body>

<header>
  <h1>faff · tester watch</h1>
  <span class="subtitle">live account monitor</span>
</header>

<!-- Token gate -->
<div id="token-gate">
  <p>Enter your faff session token to query prod. Stored in localStorage — enter once.</p>
  <p class="how">Get it from <code>faff.run</code> → DevTools → Application → Local Storage → <code>faff_token</code>, or Network tab → any request → Authorization header.</p>
  <div class="row">
    <input type="password" id="token-input" placeholder="faff session token…" autocomplete="off" />
    <button id="token-save">Connect</button>
  </div>
</div>

<!-- Toolbar (shown after auth) -->
<div id="toolbar">
  <button id="refresh-btn">Refresh</button>
  <input class="email-filter" id="email-filter" type="text" placeholder="Filter by email…" />
  <button class="ghost" id="clear-token">Clear token</button>
  <span class="ts" id="last-updated"></span>
</div>

<!-- Content -->
<div id="content"><div class="message">Connect above to load tester data.</div></div>

<script>
const API = 'https://www.faff.run/api/admin/tester-watch';
const TOKEN_KEY = 'faff_tester_watch_token';

let token = localStorage.getItem(TOKEN_KEY) ?? '';
let currentData = null;

// ── DOM refs ────────────────────────────────────────────────────────────────
const gate      = document.getElementById('token-gate');
const tokenIn   = document.getElementById('token-input');
const tokenSave = document.getElementById('token-save');
const toolbar   = document.getElementById('toolbar');
const refreshBtn = document.getElementById('refresh-btn');
const clearBtn  = document.getElementById('clear-token');
const emailFilter = document.getElementById('email-filter');
const content   = document.getElementById('content');
const lastUpd   = document.getElementById('last-updated');

// ── Init ────────────────────────────────────────────────────────────────────
if (token) {
  showConnected();
  load();
}

tokenSave.addEventListener('click', () => {
  const val = tokenIn.value.trim();
  if (!val) return;
  token = val;
  localStorage.setItem(TOKEN_KEY, token);
  showConnected();
  load();
});
tokenIn.addEventListener('keydown', (e) => { if (e.key === 'Enter') tokenSave.click(); });

refreshBtn.addEventListener('click', load);

clearBtn.addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  token = '';
  gate.style.display = '';
  toolbar.classList.remove('visible');
  content.innerHTML = '<div class="message">Connect above to load tester data.</div>';
});

emailFilter.addEventListener('input', () => {
  if (currentData) renderData(currentData);
});

// ── UI state ────────────────────────────────────────────────────────────────
function showConnected() {
  gate.style.display = 'none';
  toolbar.classList.add('visible');
}

// ── Fetch ────────────────────────────────────────────────────────────────────
async function load() {
  content.innerHTML = '<div class="message">Loading…</div>';
  refreshBtn.disabled = true;
  try {
    const filter = emailFilter.value.trim();
    const url = filter ? `${API}?email=${encodeURIComponent(filter)}` : API;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { throw new Error(`Non-JSON response (${res.status}): ${text.slice(0, 200)}`); }
    if (!res.ok) {
      if (res.status === 403) throw new Error('Token rejected (403). Check that your account has is_admin=true.');
      throw new Error(json?.error ?? `HTTP ${res.status}`);
    }
    currentData = json;
    renderData(json);
    lastUpd.textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    content.innerHTML = `<div class="message error">Error: ${e.message}</div>`;
  } finally {
    refreshBtn.disabled = false;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderData(data) {
  const filter = emailFilter.value.trim().toLowerCase();
  const testers = (data.testers ?? []).filter(t => !filter || t.email.includes(filter) || t.name.toLowerCase().includes(filter));

  if (!testers.length) {
    content.innerHTML = '<div class="message">No testers found.</div>';
    return;
  }

  content.innerHTML = testers.map(renderTester).join('');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function initials(name) {
  return (name ?? '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function renderTester(t) {
  const isOnboarded = !!t.onboardedAt;
  const p = t.profile;
  const plan = t.plan;

  // Badges
  let badges = isOnboarded
    ? `<span class="badge badge-onboarded">Onboarded</span>`
    : `<span class="badge badge-pending">Pending onboarding</span>`;
  if (t.connections?.strava) badges += `<span class="badge badge-strava">Strava</span>`;
  if (t.connections?.healthkit) badges += `<span class="badge badge-hk">HealthKit</span>`;
  if (p?.connectionsSkipped) badges += `<span class="badge badge-skipped">No connections</span>`;

  // Profile section
  const profileSection = p ? `
    <div class="section">
      <div class="section-title">Profile</div>
      <div class="kv"><span class="k">Goal</span><span class="v hi">${goalLabel(p.goalDistance)} ${p.goalDate ? '· ' + fmtDate(p.goalDate) : ''}</span></div>
      <div class="kv"><span class="k">Goal time</span><span class="v">${p.goalTime ?? '—'}</span></div>
      <div class="kv"><span class="k">Frequency</span><span class="v">${p.weeklyFrequency ? p.weeklyFrequency + 'd/wk' : '—'}</span></div>
      <div class="kv"><span class="k">Mileage target</span><span class="v">${p.weeklyMileageTarget ? p.weeklyMileageTarget + ' mi/wk' : '—'}</span></div>
      <hr class="sep">
      <div class="kv"><span class="k">History avg</span><span class="v">${p.historyAvgMi ?? '—'}</span></div>
      <div class="kv"><span class="k">Longest recent</span><span class="v">${p.historyLongest ?? '—'}</span></div>
      <div class="kv"><span class="k">Years running</span><span class="v">${p.historyYears ?? '—'}</span></div>
      <hr class="sep">
      <div class="kv"><span class="k">Timezone</span><span class="v">${p.timezone ?? '—'}</span></div>
      <div class="kv"><span class="k">HRmax</span><span class="v">${p.hrmax ?? '—'}</span></div>
      <div class="kv"><span class="k">RHR</span><span class="v">${p.rhr ?? '—'}</span></div>
      <div class="kv"><span class="k">Experience</span><span class="v">${p.experienceLevel ?? '—'}</span></div>
    </div>` : `<div class="section"><div class="section-title">Profile</div><p style="color:var(--muted);font-size:12px">Not yet onboarded</p></div>`;

  // Plan section
  const planSection = plan ? `
    <div class="section">
      <div class="section-title">Plan</div>
      <div class="kv"><span class="k">Mode</span><span class="v hi">${plan.mode}</span></div>
      <div class="kv"><span class="k">Length</span><span class="v">${plan.weekCount} weeks</span></div>
      <div class="kv"><span class="k">Race date</span><span class="v">${fmtDate(plan.raceDate)}</span></div>
      <div class="kv"><span class="k">Total mi</span><span class="v">${plan.totalPlanMi} mi</span></div>
      <div class="kv"><span class="k">Peak long run</span><span class="v">${plan.peakLongRunMi} mi</span></div>
      <div class="kv"><span class="k">Avg run</span><span class="v">${plan.avgRunMi} mi</span></div>
      <div class="kv"><span class="k">Total run days</span><span class="v">${plan.totalRunDays}</span></div>
      <hr class="sep">
      <div class="section-title" style="margin-top:4px">Early ramp (wk 1–4)</div>
      ${renderRamp(plan.earlyRamp)}
    </div>` : `<div class="section"><div class="section-title">Plan</div><p style="color:var(--muted);font-size:12px">${isOnboarded ? 'No active plan' : 'Not yet onboarded'}</p></div>`;

  // Activity section
  const actSection = `
    <div class="section">
      <div class="section-title">Activity</div>
      <div class="kv"><span class="k">Joined</span><span class="v">${fmtDate(t.createdAt)}</span></div>
      <div class="kv"><span class="k">Onboarded</span><span class="v">${t.onboardedAt ? fmtDateTime(t.onboardedAt) : '<span class="muted">—</span>'}</span></div>
      <div class="kv"><span class="k">Last seen</span><span class="v">${t.lastSeen ? fmtDateTime(t.lastSeen) : '<span class="muted" style="color:var(--muted)">Never</span>'}</span></div>
      <hr class="sep">
      <div class="kv"><span class="k">Runs (30d)</span><span class="v hi">${t.runs30.count ?? 0}</span></div>
      <div class="kv"><span class="k">Miles (30d)</span><span class="v">${t.runs30.mi ?? 0} mi</span></div>
      <hr class="sep">
      <div class="kv"><span class="k">Strava</span><span class="v">${t.connections?.strava ? '✓ connected' : '—'}</span></div>
      <div class="kv"><span class="k">HealthKit</span><span class="v">${t.connections?.healthkit ? '✓ connected' : '—'}</span></div>
    </div>`;

  // Doctrine checks
  const checksHtml = t.checks.length ? `
    <div class="checks">
      ${t.checks.map(c => `
        <div class="check check-${c.pass ? 'pass' : 'fail'}" title="${c.note}">
          <span class="check-icon">${c.pass ? '✓' : '✗'}</span>
          ${c.label}${c.note ? ` · ${c.note}` : ''}
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="card">
      <div class="card-head">
        <div class="avatar">${initials(t.name)}</div>
        <div class="info">
          <div class="name">${t.name}</div>
          <div class="email">${t.email}</div>
        </div>
        <div class="badges">${badges}</div>
      </div>
      <div class="card-body">
        ${profileSection}
        ${planSection}
        ${actSection}
      </div>
      ${checksHtml}
    </div>`;
}

function goalLabel(dist) {
  const map = { marathon: 'Marathon', half: 'Half Marathon', '10k': '10K', '5k': '5K', none: 'Get faster', coached: 'Coached' };
  return map[dist] ?? dist ?? '—';
}

function renderRamp(ramp) {
  if (!ramp || !ramp.length) return '<p style="color:var(--muted);font-size:12px">—</p>';
  const max = Math.max(...ramp, 1);
  const bars = ramp.map((mi, i) => {
    const h = Math.round((mi / max) * 28);
    return `<div class="ramp-bar" title="Wk ${i + 1}: ${mi}mi" style="height:${Math.max(h, 3)}px; flex:1"></div>`;
  }).join('');
  const labels = ramp.map(mi => `<span style="flex:1;text-align:center;font-size:10px;color:var(--muted)">${mi}</span>`).join('');
  return `<div class="ramp">${bars}</div><div style="display:flex;gap:3px;margin-top:3px">${labels}</div>`;
}
</script>
</body>
</html>
